name: Build And Publish Standalone Image

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 standalone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          provenance: false
          tags: ml2mqtt-ci:amd64
          cache-from: type=gha,scope=standalone-amd64
          cache-to: type=gha,mode=max,scope=standalone-amd64

      - name: Smoke test Python imports
        run: >-
          docker run --rm --entrypoint /app/ml2mqtt/.venv/bin/python ml2mqtt-ci:amd64
          -c "import flask, numpy, pandas, sklearn, waitress; print('imports-ok')"

      - name: Smoke test Waitress entrypoint
        run: docker run --rm ml2mqtt-ci:amd64 --help

  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build arm64 standalone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=standalone-arm64
          cache-to: type=gha,mode=max,scope=standalone-arm64

  publish:
    name: Publish multi-arch image
    if: github.event_name != 'pull_request'
    needs:
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=standalone-amd64
            type=gha,scope=standalone-arm64
            type=gha,scope=standalone-release
          cache-to: type=gha,mode=max,scope=standalone-release
