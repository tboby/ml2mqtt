ml2mqtt_test_preset_kitchen:
  alias: ML2MQTT Test Preset Kitchen
  sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ml2mqtt_test_temperature
      data:
        value: 24
    - service: input_number.set_value
      target:
        entity_id: input_number.ml2mqtt_test_humidity
      data:
        value: 55
    - service: input_number.set_value
      target:
        entity_id: input_number.ml2mqtt_test_illuminance
      data:
        value: 700
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ml2mqtt_test_motion

